<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b2e"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2a4a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6c47ff"/>
      <stop offset="100%" stop-color="#00c8ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6c47ff" opacity="0.8"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00c8ff" opacity="0.8"/>
    </marker>
  </defs>
  <rect width="900" height="520" fill="url(#bg)" rx="12"/>
  <line x1="165" y1="180" x2="370" y2="255" stroke="url(#accentGrad)" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6" marker-end="url(#arrow)"/>
  <line x1="165" y1="260" x2="370" y2="260" stroke="url(#accentGrad)" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6" marker-end="url(#arrow)"/>
  <line x1="165" y1="340" x2="370" y2="265" stroke="url(#accentGrad)" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6" marker-end="url(#arrow)"/>
  <line x1="530" y1="260" x2="660" y2="200" stroke="url(#accentGrad)" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6" marker-end="url(#arrowCyan)"/>
  <line x1="530" y1="260" x2="660" y2="260" stroke="url(#accentGrad)" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6" marker-end="url(#arrowCyan)"/>
  <line x1="530" y1="260" x2="660" y2="320" stroke="url(#accentGrad)" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6" marker-end="url(#arrowCyan)"/>
  <rect x="30" y="148" width="130" height="62" rx="8" fill="url(#nodeGrad)" stroke="#6c47ff" stroke-width="1" opacity="0.9"/>
  <rect x="30" y="148" width="130" height="3" rx="8" fill="#6c47ff" opacity="0.7"/>
  <text x="95" y="172" text-anchor="middle" fill="#a0aec0" font-family="sans-serif" font-size="10" font-weight="600" letter-spacing="0.5">NETWORK</text>
  <text x="95" y="188" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="11" font-weight="600">Traffic Monitor</text>
  <rect x="30" y="228" width="130" height="62" rx="8" fill="url(#nodeGrad)" stroke="#6c47ff" stroke-width="1" opacity="0.9"/>
  <rect x="30" y="228" width="130" height="3" rx="8" fill="#6c47ff" opacity="0.7"/>
  <text x="95" y="252" text-anchor="middle" fill="#a0aec0" font-family="sans-serif" font-size="10" font-weight="600" letter-spacing="0.5">ENDPOINT</text>
  <text x="95" y="268" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="11" font-weight="600">Detection</text>
  <rect x="30" y="308" width="130" height="62" rx="8" fill="url(#nodeGrad)" stroke="#6c47ff" stroke-width="1" opacity="0.9"/>
  <rect x="30" y="308" width="130" height="3" rx="8" fill="#6c47ff" opacity="0.7"/>
  <text x="95" y="332" text-anchor="middle" fill="#a0aec0" font-family="sans-serif" font-size="10" font-weight="600" letter-spacing="0.5">LOG</text>
  <text x="95" y="348" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="11" font-weight="600">Analysis</text>
  <rect x="350" y="200" width="190" height="120" rx="12" fill="url(#nodeGrad)" stroke-width="0"/>
  <rect x="350" y="200" width="190" height="120" rx="12" fill="none" stroke="url(#accentGrad)" stroke-width="2" filter="url(#softGlow)"/>
  <rect x="350" y="200" width="190" height="4" rx="12" fill="url(#accentGrad)" opacity="0.9"/>
  <circle cx="450" cy="238" r="16" fill="#6c47ff" opacity="0.15"/>
  <circle cx="450" cy="238" r="10" fill="none" stroke="#6c47ff" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="450" cy="238" r="3" fill="#00c8ff"/>
  <text x="450" y="262" text-anchor="middle" fill="#a0aec0" font-family="sans-serif" font-size="10" font-weight="600" letter-spacing="1">AI THREAT ANALYST</text>
  <text x="450" y="278" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="13" font-weight="700">Analysis Engine</text>
  <text x="450" y="294" text-anchor="middle" fill="#6c47ff" font-family="sans-serif" font-size="10">ML - Behavioral - UEBA</text>
  <text x="450" y="310" text-anchor="middle" fill="#718096" font-family="sans-serif" font-size="9">Real-time processing</text>
  <rect x="680" y="168" width="180" height="62" rx="8" fill="url(#nodeGrad)" stroke="#ff4757" stroke-width="1" opacity="0.9"/>
  <rect x="680" y="168" width="180" height="3" rx="8" fill="#ff4757" opacity="0.7"/>
  <text x="770" y="192" text-anchor="middle" fill="#a0aec0" font-family="sans-serif" font-size="10" font-weight="600" letter-spacing="0.5">CRITICAL</text>
  <text x="770" y="208" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="11" font-weight="600">Automated Response</text>
  <rect x="680" y="228" width="180" height="62" rx="8" fill="url(#nodeGrad)" stroke="#f5a623" stroke-width="1" opacity="0.9"/>
  <rect x="680" y="228" width="180" height="3" rx="8" fill="#f5a623" opacity="0.7"/>
  <text x="770" y="252" text-anchor="middle" fill="#a0aec0" font-family="sans-serif" font-size="10" font-weight="600" letter-spacing="0.5">MEDIUM RISK</text>
  <text x="770" y="268" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="11" font-weight="600">SOC Investigation</text>
  <rect x="680" y="288" width="180" height="62" rx="8" fill="url(#nodeGrad)" stroke="#00c8a0" stroke-width="1" opacity="0.9"/>
  <rect x="680" y="288" width="180" height="3" rx="8" fill="#00c8a0" opacity="0.7"/>
  <text x="770" y="312" text-anchor="middle" fill="#a0aec0" font-family="sans-serif" font-size="10" font-weight="600" letter-spacing="0.5">LOW / CLEAR</text>
  <text x="770" y="328" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="11" font-weight="600">Logged and Monitored</text>
  <text x="450" y="460" text-anchor="middle" fill="#4a5568" font-family="sans-serif" font-size="11" letter-spacing="2">PHANTOM SHIELD - AI-DRIVEN SECURITY OPERATIONS</text>
  <circle cx="450" cy="238" r="20" fill="none" stroke="#6c47ff" stroke-width="1" opacity="0">
    <animate attributeName="r" values="16;28;16" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
