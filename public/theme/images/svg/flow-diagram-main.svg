<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1889 150" fill="none">
  <defs>
    <filter id="hubGlow" x="-22%" y="-22%" width="144%" height="144%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- DATA SOURCES -->
  <circle cx="20" cy="28" r="6" fill="#f04545" opacity="0.88"/>
  <text x="36" y="34" font-family="'Courier New',Courier,monospace" font-size="20" fill="#d0e8f0" letter-spacing="1">KDC · FTP</text>
  <circle cx="20" cy="62" r="6" fill="#ffb347" opacity="0.88"/>
  <text x="36" y="68" font-family="'Courier New',Courier,monospace" font-size="20" fill="#d0e8f0" letter-spacing="1">HTTP · DNS</text>
  <circle cx="20" cy="96" r="6" fill="#f04545" opacity="0.88"/>
  <text x="36" y="102" font-family="'Courier New',Courier,monospace" font-size="20" fill="#d0e8f0" letter-spacing="1">LDAP · AUTH</text>
  <circle cx="20" cy="130" r="6" fill="#37c6f4" opacity="0.7"/>
  <text x="36" y="136" font-family="'Courier New',Courier,monospace" font-size="20" fill="#d0e8f0" opacity="0.72" letter-spacing="1">SMTP · TLS</text>

  <!-- CONVERGENCE PATHS -->
  <path d="M 255 28  C 460 28  520 75 635 75" stroke="#d06060" stroke-width="1.3" opacity="0.7"/>
  <path d="M 255 62  C 460 62  540 75 635 75" stroke="#c88040" stroke-width="1.3" opacity="0.65"/>
  <path d="M 255 96  C 460 96  540 75 635 75" stroke="#d06060" stroke-width="1.3" opacity="0.7"/>
  <path d="M 255 130 C 460 130 520 75 635 75" stroke="#37c6f4" stroke-width="1.1" opacity="0.48"/>

  <!-- AI ENGINE HUB -->
  <rect x="635" y="10" width="196" height="130" rx="6" fill="#030d1a" stroke="#37c6f4" stroke-width="1.6" filter="url(#hubGlow)"/>
  <rect x="640" y="15" width="186" height="120" rx="5" fill="#37c6f4" fill-opacity="0.04"/>
  <text x="733" y="63" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="27" fill="#37c6f4" opacity="0.98" letter-spacing="2">AI ENGINE</text>
  <text x="733" y="86" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="13" fill="#7dafc4" opacity="0.68" letter-spacing="1.2">THREAT INTELLIGENCE</text>
  <text x="733" y="105" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="11" fill="#37c6f4" opacity="0.35" letter-spacing="0.5">real-time · 4 streams</text>

  <!-- OUTPUT PATHS -->
  <path d="M 831 58 C 960 58 980 28 1090 28" stroke="#f04545" stroke-width="1.6" opacity="0.82"/>
  <line x1="1090" y1="28" x2="1850" y2="28" stroke="#f04545" stroke-width="1.3" opacity="0.55"/>
  <line x1="831" y1="75" x2="1850" y2="75" stroke="#ffb347" stroke-width="1.6" opacity="0.68"/>
  <path d="M 831 92 C 960 92 980 122 1090 122" stroke="#37c6f4" stroke-width="1.3" opacity="0.5"/>
  <line x1="1090" y1="122" x2="1850" y2="122" stroke="#37c6f4" stroke-width="1.1" opacity="0.38"/>

  <!-- HIGH THREAT outcome -->
  <rect x="1106" y="16" width="34" height="18" rx="3" fill="#f04545" fill-opacity="0.2" stroke="#f04545" stroke-width="0.9"/>
  <text x="1123" y="28.5" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="11" font-weight="bold" fill="#f04545">1%</text>
  <text x="1150" y="21" font-family="'Courier New',Courier,monospace" font-size="19" fill="#f09090" opacity="0.95" letter-spacing="0.8">CONFIRMED THREAT</text>
  <text x="1150" y="42" font-family="'Courier New',Courier,monospace" font-size="14" fill="#f04545" opacity="0.75" letter-spacing="0.5">&#8594; ISOLATE &amp; BLOCK</text>

  <!-- MEDIUM outcome -->
  <rect x="1106" y="63" width="34" height="18" rx="3" fill="#ffb347" fill-opacity="0.18" stroke="#ffb347" stroke-width="0.9"/>
  <text x="1123" y="75.5" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="11" font-weight="bold" fill="#ffb347">6%</text>
  <text x="1150" y="68" font-family="'Courier New',Courier,monospace" font-size="19" fill="#ffb347" opacity="0.92" letter-spacing="0.8">VULNERABILITY</text>
  <text x="1150" y="89" font-family="'Courier New',Courier,monospace" font-size="14" fill="#ffb347" opacity="0.72" letter-spacing="0.5">&#8594; PATCH IN SLA</text>

  <!-- CLEAN outcome -->
  <rect x="1106" y="110" width="34" height="18" rx="3" fill="#37c6f4" fill-opacity="0.12" stroke="#37c6f4" stroke-width="0.8"/>
  <text x="1123" y="122.5" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="11" font-weight="bold" fill="#37c6f4" opacity="0.75">93%</text>
  <text x="1150" y="115" font-family="'Courier New',Courier,monospace" font-size="19" fill="#7dafc4" opacity="0.8" letter-spacing="0.8">NO THREAT FOUND</text>
  <text x="1150" y="136" font-family="'Courier New',Courier,monospace" font-size="14" fill="#37c6f4" opacity="0.52" letter-spacing="0.5">&#8594; AUDIT &amp; LOG</text>

  <!-- ENDPOINT NODES -->
  <line x1="1860" y1="22" x2="1860" y2="128" stroke="#37c6f4" stroke-width="0.6" opacity="0.2"/>
  <circle cx="1860" cy="28"  r="7"   fill="none" stroke="#f04545" stroke-width="1.4" opacity="0.85"/>
  <circle cx="1860" cy="28"  r="2.8" fill="#f04545" opacity="0.92"/>
  <circle cx="1860" cy="75"  r="7"   fill="none" stroke="#ffb347" stroke-width="1.4" opacity="0.72"/>
  <circle cx="1860" cy="75"  r="2.8" fill="#ffb347" opacity="0.78"/>
  <circle cx="1860" cy="122" r="6"   fill="none" stroke="#37c6f4" stroke-width="1.1" opacity="0.52"/>
  <circle cx="1860" cy="122" r="2.2" fill="#37c6f4" opacity="0.58"/>
</svg>
